<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlenderFox — Сохранённые работы</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/saved.css">
<link rel="stylesheet" href="../css/medals.css">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config/supabase.js"></script>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Сохранённые работы</div>
        <div class="page-sub">Твои работы по каждому заданию</div>
      </div>
    </div>
    <div class="page-body" id="saved-body"></div>
  </main>
</div>

<div class="saving-toast" id="toast"></div>

<script src="../js/utils/data.js"></script>
<script src="../js/auth/session.js"></script>
<script src="../js/auth/auth.js"></script>
<script src="../js/db/completed.db.js"></script>
<script src="../js/db/medals.db.js"></script>
<script src="../js/db/saved.db.js"></script>
<script src="../js/db/tasks.db.js"></script>
<script src="../js/utils/medals.logic.js"></script>
<script src="../js/utils/router.js"></script>
<script src="../js/ui/sidebar.js"></script>
<script src="../js/ui/medals.ui.js"></script>
<script src="../js/ui/saved.ui.js"></script>
<script>
(async function() {
  const u = checkAuth();
  if (!u) return;
  renderSidebar('saved');
  initMedalUI();
  await syncFromSupabase();
  renderSaved();
})();
</script>
</body>
</html>
