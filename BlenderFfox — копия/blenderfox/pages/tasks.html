<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlenderFox — Задания</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/tasks.css">
<link rel="stylesheet" href="../css/medals.css">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config/supabase.js"></script>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Задания по модулям</div>
        <div class="page-sub">Нажми на задание чтобы открыть инструкцию</div>
      </div>
    </div>
    <div class="page-body" id="tasks-body"></div>
  </main>
</div>

<script src="../js/utils/data.js"></script>
<script src="../js/auth/session.js"></script>
<script src="../js/auth/auth.js"></script>
<script src="../js/db/completed.db.js"></script>
<script src="../js/db/medals.db.js"></script>
<script src="../js/db/saved.db.js"></script>
<script src="../js/db/tasks.db.js"></script>
<script src="../js/utils/medals.logic.js"></script>
<script src="../js/utils/router.js"></script>
<script src="../js/ui/sidebar.js"></script>
<script src="../js/ui/tasks.ui.js"></script>
<script src="../js/ui/medals.ui.js"></script>
<script>
(async function() {
  checkAuth();
  renderSidebar('tasks');
  renderTaskPanel();
  initMedalUI();          // попап медали + toast
  await syncFromSupabase();
  renderTasks();
})();

function onTaskCompleted() { renderTasks(); }

function renderTasks() {
  const completedTasks = getCompletedTasks();
  document.getElementById('tasks-body').innerHTML = MODULES.map(m => `
    <div class="module-block fade-up">
      <div class="module-header">
        <div class="module-icon">${m.icon}</div>
        <div class="module-title">${m.title}</div>
        <div class="module-badge ${m.badge}">${m.tasks.filter(t => completedTasks.has(t.id)).length} / ${m.tasks.length}</div>
      </div>
      <div>
        ${m.tasks.map(t => {
          const done = completedTasks.has(t.id);
          return `
          <div class="task-card" onclick="openTask(${t.id})">
            <div class="task-card-accent" style="background:${t.color}"></div>
            <div class="task-card-icon" style="background:${t.bg}">${t.emoji}</div>
            <div class="task-card-info">
              <div class="task-card-title">${t.title}</div>
              <div class="task-card-sub">${t.level}</div>
            </div>
            <div class="task-card-status ${done ? 'done' : ''}">
              ${done ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
