<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlenderFox — Медали</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/medals.css">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config/supabase.js"></script>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">🏅 Медали</div>
        <div class="page-sub">Нажми на медаль чтобы узнать как её получить</div>
      </div>
    </div>
    <div class="page-body">
      <div class="medals-summary">
        <div class="medals-summary-card earned-card">
          <div class="medals-summary-num" id="medals-earned-num">0</div>
          <div>
            <div class="medals-summary-label">Получено медалей</div>
            <div class="medals-summary-sub">из <span id="medals-total">12</span> возможных</div>
          </div>
        </div>
        <div class="medals-summary-card locked-card">
          <div class="medals-summary-num" id="medals-locked-num">12</div>
          <div>
            <div class="medals-summary-label">Ещё не открыто</div>
            <div class="medals-summary-sub">продолжай учиться!</div>
          </div>
        </div>
      </div>
      <div class="medals-grid" id="medals-grid"></div>
    </div>
  </main>
</div>

<script src="../js/utils/data.js"></script>
<script src="../js/auth/session.js"></script>
<script src="../js/auth/auth.js"></script>
<script src="../js/db/completed.db.js"></script>
<script src="../js/db/medals.db.js"></script>
<script src="../js/db/saved.db.js"></script>
<script src="../js/db/tasks.db.js"></script>
<script src="../js/utils/medals.logic.js"></script>
<script src="../js/utils/router.js"></script>
<script src="../js/ui/sidebar.js"></script>
<script src="../js/ui/tasks.ui.js"></script>
<script src="../js/ui/medals.ui.js"></script>
<script>
(async function() {
  checkAuth();
  renderSidebar('medals');
  initMedalUI();          // попап + toast
  await syncFromSupabase();
  renderMedals();
})();
</script>
</body>
</html>
