<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlenderFox — Профиль</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/sidebar.css">
<link rel="stylesheet" href="../css/profile.css">
<link rel="stylesheet" href="../css/medals.css">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/config/supabase.js"></script>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Профиль</div>
        <div class="page-sub">Личные данные и настройки</div>
      </div>
    </div>
    <div class="page-body">
      <div class="profile-layout">
        <div>
          <div class="profile-card-main">
            <div class="profile-avatar-big">
              <span id="p-avatar-letter">А</span>
              <div class="avatar-ring"></div>
            </div>
            <div class="profile-name-big" id="p-name">Студент</div>
            <div class="profile-email-txt" id="p-email">email@example.com</div>
            <div class="profile-level-tag">
              <svg viewBox="0 0 24 24" width="10" height="10" fill="var(--c-dk)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span id="p-level">Студент · Уровень 1</span>
            </div>
            <div class="profile-stats-row">
              <div class="pstat"><div class="pstat-val" id="pstat-done">0</div><div class="pstat-lbl">Заданий</div></div>
              <div class="pstat"><div class="pstat-val" id="pstat-modules">0</div><div class="pstat-lbl">Модулей</div></div>
              <div class="pstat" style="cursor:pointer" onclick="location.href='medals.html'">
                <div class="pstat-val" id="pstat-medals">0</div>
                <div class="pstat-lbl" style="color:var(--c)">Медалей →</div>
              </div>
            </div>
          </div>
        </div>

        <div class="profile-right">
          <div class="settings-card">
            <div class="settings-card-title">Уведомления</div>
            <button class="menu-row">
              <div class="menu-row-icon" style="background:#E8F4FD">
                <svg viewBox="0 0 24 24" stroke="#3B82F6"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              </div>
              <div class="menu-row-info">
                <div class="menu-row-title">Напоминания об уроках</div>
                <div class="menu-row-sub">Ежедневно в 18:00</div>
              </div>
              <div class="menu-row-right">
                <span class="notif-badge">3</span>
                <svg class="menu-chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </button>
            <button class="menu-row" onclick="location.href='medals.html'">
              <div class="menu-row-icon" style="background:#FFF8E1">
                <svg viewBox="0 0 24 24" stroke="#D97706"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
              </div>
              <div class="menu-row-info">
                <div class="menu-row-title">Медали</div>
                <div class="menu-row-sub" id="profile-medals-sub">0 медалей получено</div>
              </div>
              <div class="menu-row-right">
                <span class="notif-badge" id="profile-medals-new">0</span>
                <svg class="menu-chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </button>
          </div>

          <div class="settings-card">
            <div class="settings-card-title">Настройки</div>
            <button class="menu-row">
              <div class="menu-row-icon" style="background:var(--c-bg)">
                <svg viewBox="0 0 24 24" stroke="var(--c)"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="menu-row-info">
                <div class="menu-row-title">Личные данные</div>
                <div class="menu-row-sub">Имя, email, аватар</div>
              </div>
              <div class="menu-row-right"><svg class="menu-chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
            </button>
            <button class="menu-row">
              <div class="menu-row-icon" style="background:#F3E8FF">
                <svg viewBox="0 0 24 24" stroke="#8B5CF6"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
              </div>
              <div class="menu-row-info">
                <div class="menu-row-title">Язык интерфейса</div>
                <div class="menu-row-sub">Русский</div>
              </div>
              <div class="menu-row-right"><svg class="menu-chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
            </button>
            <button class="menu-row">
              <div class="menu-row-icon" style="background:var(--green-bg)">
                <svg viewBox="0 0 24 24" stroke="var(--green)"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              </div>
              <div class="menu-row-info">
                <div class="menu-row-title">Прогресс обучения</div>
                <div class="menu-row-sub" id="progress-sub">0 из 10 заданий выполнено</div>
              </div>
              <div class="menu-row-right"><svg class="menu-chev" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
            </button>
          </div>

          <div class="settings-card">
            <button class="menu-row" onclick="doLogout()">
              <div class="menu-row-icon" style="background:#FEE8E8">
                <svg viewBox="0 0 24 24" stroke="#D32F2F"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </div>
              <div class="menu-row-info">
                <div class="menu-row-title" style="color:#D32F2F">Выйти из аккаунта</div>
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/utils/data.js"></script>
<script src="../js/auth/session.js"></script>
<script src="../js/auth/auth.js"></script>
<script src="../js/db/completed.db.js"></script>
<script src="../js/db/medals.db.js"></script>
<script src="../js/db/saved.db.js"></script>
<script src="../js/db/tasks.db.js"></script>
<script src="../js/utils/medals.logic.js"></script>
<script src="../js/utils/router.js"></script>
<script src="../js/ui/sidebar.js"></script>
<script src="../js/ui/medals.ui.js"></script>
<script src="../js/ui/profile.ui.js"></script>
<script>
(async function() {
  const u = checkAuth();
  if (!u) return;
  renderSidebar('profile');
  initMedalUI();
  await syncFromSupabase();
  renderProfile();
})();
</script>
</body>
</html>
